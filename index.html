<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>現場対応用サイト</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Meiryo', 'Yu Gothic', sans-serif; background: #dde4ef; min-height: 100vh; }
    .site-header { background: #1a2e5a; padding: 22px 40px; text-align: left; }
    .site-header h1 { color: #fff; font-size: 2rem; font-weight: 900; letter-spacing: 0.05em; }
    .main { padding: 36px 32px 60px; max-width: 1300px; }
    .section-label { color: #1a2e5a; font-size: 0.82rem; font-weight: 700; margin-bottom: 8px;
      padding-left: 4px; letter-spacing: 0.05em; text-transform: uppercase; opacity: 0.7; }
    .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
    .cards-row-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
    .card-btn {
      display: flex; align-items: center; justify-content: center;
      width: 100%; min-height: 80px; padding: 18px 14px;
      color: #fff; font-size: 1rem; font-weight: 700; text-align: center;
      border: none; border-radius: 8px; cursor: pointer; text-decoration: none;
      line-height: 1.5; box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .card-btn.blue  { background: #4da6e8; }
    .card-btn.blue:hover  { background: #2a8ad4; box-shadow: 0 6px 16px rgba(0,0,0,0.25); }
    .card-btn.pink  { background: #e91e8c; }
    .card-btn.pink:hover  { background: #c0156f; box-shadow: 0 6px 16px rgba(0,0,0,0.25); }
    .divider { border: none; border-top: 1px solid #c0cad8; margin: 8px 0 20px; }
    @media (max-width: 1000px) {
      .cards-row { grid-template-columns: repeat(2, 1fr); }
      .cards-row-5 { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 560px) {
      .cards-row, .cards-row-5 { grid-template-columns: 1fr; }
      .site-header h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <header class="site-header"><h1>現場対応用サイト</h1></header>
  <main class="main">

    <div class="section-label">現場対応ツール</div>
    <div class="cards-row">
      <a class="card-btn blue" href="catalog.html">旧カタログ<br>（ポスト・宅配ボックス）</a>
      <a class="card-btn blue" href="faults.html">不具合事例集</a>
      <a class="card-btn blue" href="locks.html">錠前種類</a>
      <a class="card-btn blue" href="successors.html">宅配ボックス<br>後継品一覧</a>
    </div>

    <hr class="divider">
    <div class="section-label">運賃・料金表</div>
    <div class="cards-row-5">
      <a class="card-btn pink" href="unchin_shanai.html">商品別運賃一覧表<br>（社内用）</a>
      <a class="card-btn pink" href="unchin_kyakusaki.html">商品別運賃一覧表<br>（客先用）</a>
      <a class="card-btn pink" href="unchin_dairiten.html">代理店別<br>運賃ルール</a>
      <a class="card-btn pink" href="unchin_202104.html">202104<br>仕入先直送 運賃</a>
      <a class="card-btn pink" href="unchin_202404.html">202404<br>仕入先直送 運賃</a>
    </div>

  </main>
</body>
</html>
